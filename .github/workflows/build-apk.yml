name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android
          npx cap init ALSmartPOS com.yourcompany.smartpos --web-dir=.
          npx cap add android

      - name: Copy web files
        run: |
          cp index.html android/app/src/main/assets/public/
          cp icon-192.png android/app/src/main/res/drawable/
          cp icon-512.png android/app/src/main/res/drawable/

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartPOS-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
