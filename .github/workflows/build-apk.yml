name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create www folder and copy web files
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp icon-192.png www/ 2>/dev/null || true
          cp icon-512.png www/ 2>/dev/null || true

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Initialize Capacitor
        run: npx cap init ALSmartPOS com.yourcompany.smartpos --web-dir=www

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web files to Android assets (redundant but safe)
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r www/* android/app/src/main/assets/public/

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartPOS-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
