name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create www folder and copy web files
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp icon-192.png www/ 2>/dev/null || true
          cp icon-512.png www/ 2>/dev/null || true

      - name: Initialize npm project
        run: npm init -y

      - name: Install Capacitor packages
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        run: npx cap init ALSmartPOS com.yourcompany.smartpos --web-dir=www

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web files to Android
        run: npx cap sync android

      - name: Fix Kotlin version conflict
        run: |
          # Add Kotlin version constraint and exclude old jdk8 variant
          cat >> android/build.gradle << 'EOF'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  }
              }
          }

          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          EOF

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartPOS-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
